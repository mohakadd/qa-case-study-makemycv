# Tests rapides déclenchés à chaque Push ou Pull Request
name: E2E Tests (PR)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  deployment_status:

jobs:
  e2e-pr:
    name: E2E Tests (PR — Chromium)
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
    # Se lance quand la Preview Vercel est prête, ou sur un push/PR
    if: >
      (github.event_name == 'deployment_status'
        && github.event.deployment_status.state == 'success'
        && github.event.deployment.environment == 'Preview')
      || github.event_name == 'push'
      || github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests (Chromium)
        run: npx playwright test --project=chromium
        env:
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          BASE_URL: ${{ github.event.deployment_status.environment_url || vars.BASE_URL || 'https://makemycv.com' }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-pr-${{ github.run_number }}
          path: playwright-report/
          retention-days: 7
