# Suite complète multi-navigateurs, tous les jours ouvrés à 7h00 (Paris)
# Cron à 5h00 UTC (= 7h00 CEST) pour absorber les délais GitHub Actions (~1-2h en pic de charge)
name: E2E Tests (Full)

on:
  schedule:
    - cron: '0 5 * * 1-5'
  workflow_dispatch:

jobs:
  e2e-full:
    name: E2E Tests (Full — ${{ matrix.project }})
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy

    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit, mobile-chrome, mobile-safari]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests (${{ matrix.project }})
        run: npx playwright test --project=${{ matrix.project }}
        env:
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          BASE_URL: ${{ vars.BASE_URL || 'https://makemycv.com' }}
          HOME: /root

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.project }}-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14
