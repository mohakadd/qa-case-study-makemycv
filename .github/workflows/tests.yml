name: Playwright E2E Tests

on:
  deployment_status:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Tous les jours de semaine à 7h00 (avant le déploiement canary de 9h)
    - cron: '0 7 * * 1-5'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement cible'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]
      browsers:
        description: 'Navigateurs à tester'
        required: false
        default: 'chromium'

env:
  BASE_URL: ${{ vars.BASE_URL || 'https://makemycv.com' }}

jobs:
  # ----------------------------------------------------------------
  # Job 1 : Tests rapides sur PR (Chromium uniquement)
  # ----------------------------------------------------------------
  e2e-pr:
    name: E2E Tests (PR — Chromium)
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.43.0-jammy
    # Exclusivité : Se lance quand la Preview Vercel est prête, ou sur un push/PR manuel du développeur
    if: (github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success' && github.event.deployment.environment == 'Preview') || github.event_name == 'push' || github.event_name == 'pull_request'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests (Chromium)
        run: npx playwright test --project=chromium
        env:
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          # On intercepte l'URL Vercel si elle existe, sinon URL par défaut
          BASE_URL: ${{ github.event.deployment_status.environment_url || env.BASE_URL }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-pr-${{ github.run_number }}
          path: playwright-report/
          retention-days: 7

  # ----------------------------------------------------------------
  # Job 2 : Suite complète multi-navigateurs (cron daily)
  # ----------------------------------------------------------------
  e2e-full:
    name: E2E Tests (Full — Multi-browser)
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.43.0-jammy
    # Exclusivité : Se lance uniquement via la tâche planifiée de 7h00 ou manuellement.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit, mobile-chrome, mobile-safari]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests (${{ matrix.project }})
        run: npx playwright test --project=${{ matrix.project }}
        env:
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          BASE_URL: ${{ env.BASE_URL }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.project }}-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14

  # ----------------------------------------------------------------
  # Job 3 : Smoke tests post-déploiement canary (prod)
  # ----------------------------------------------------------------
  smoke-canary:
    name: Smoke Tests (Canary — Production)
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.43.0-jammy
    # Uniquement géré par déclenchement manuel, verrouillé sur "production".
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Smoke tests on Production
        run: npx playwright test --grep @smoke --project=chromium
        env:
          BASE_URL: https://makemycv.com
          TEST_EMAIL: ${{ secrets.PROD_TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.PROD_TEST_PASSWORD }}

      - name: Notify on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: '🚨 Smoke tests FAILED on Production after canary deploy!'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_QA_WEBHOOK }}

      - name: Trigger Vercel Automated Rollback
        if: failure()
        run: |
          echo "🚨 Smoke tests failed! Initiating Vercel Instant Rollback..."
          curl -X POST "https://api.vercel.com/v1/projects/${{ secrets.VERCEL_PROJECT_ID }}/rollback" \
               -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}"
